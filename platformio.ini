; PlatformIO Project Configuration File
;
; Project: Growatt Solar Inverter MQTT Gateway
; Hardware: ESP8266 NodeMCU with RS485 interface
; Description: Reads Modbus data from Growatt MID15KTL3 inverter and publishes to MQTT
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino

; Serial Monitor Settings
monitor_speed = 115200
monitor_filters =
    direct
    time

; Upload Settings
upload_speed = 921600

; Build flags
build_flags =
    -D ARDUINO_ARCH_ESP8266

; Library dependencies
lib_deps =
    knolleary/PubSubClient@^2.8
    4-20ma/ModbusMaster@^2.0.1
    esphome/ESPAsyncTCP-esphome@^2.0.0

; OTA Upload (uncomment and configure when ready)
; upload_protocol = espota
; upload_port = <IP_ADDRESS>
; upload_flags =
;     --auth=<OTA_PASSWORD>
