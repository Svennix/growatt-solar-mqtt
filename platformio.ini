; PlatformIO Project Configuration File
;
; Project: Growatt Solar Inverter MQTT Gateway
; Hardware: ESP32-C6-Mini with TTL485-V2.0 RS485 interface (auto direction)
; Description: Reads Modbus data from Growatt MID 15/20KTL3-XL inverter and publishes to MQTT
;
; Build/upload:
;   USB  : pio run -e esp32-c6-devkitc-1 -t upload   (default; use for first flash)
;   OTA  : pio run -e ota -t upload                  (wireless, after first USB flash)
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-c6-devkitc-1
; OTA auth password is kept out of git in ota_local.ini (gitignored)
extra_configs = ota_local.ini

; ---- Settings shared by every environment ----
[env]
; ESP32-C6 requires arduino-esp32 3.x, which the official "espressif32" platform
; does not yet ship. Use the pioarduino fork (RISC-V toolchain + core 3.x).
; Update the release tag from https://github.com/pioarduino/platform-espressif32/releases
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino

; This board is an ESP32-C6-N4 => 4MB flash. Using the 8MB settings produces an
; invalid partition table (slots past end of flash) and the board boot-loops.
; min_spiffs gives two ~1.875MB OTA app slots within 4MB.
; (Changing the partition table requires a one-time USB flash, not OTA.)
board_upload.flash_size = 4MB
board_build.partitions = min_spiffs.csv

; Serial Monitor Settings
monitor_speed = 115200
monitor_filters =
    direct
    time

; Library dependencies
lib_deps =
    knolleary/PubSubClient@^2.8
    4-20ma/ModbusMaster@^2.0.1
    bblanchon/ArduinoJson@^7.4

; ---- USB upload (default) ----
[env:esp32-c6-devkitc-1]
upload_speed = 921600

; ---- Wireless OTA upload ----
; Usage: pio run -e ota -t upload
; upload_flags (--auth=<OTA_PASSWORD>) come from ota_local.ini (gitignored)
[env:ota]
upload_protocol = espota
upload_port = 10.0.20.7
